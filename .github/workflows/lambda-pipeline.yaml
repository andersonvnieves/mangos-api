name: Deploy Mangos API

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: br.dev.avn.mangos.WebApi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Lambda Tools
        run: dotnet tool install -g Amazon.Lambda.Tools

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::230287251097:role/oicd-github
          aws-region: sa-east-1

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release

      - name: Deploy Lambda
        run: dotnet lambda deploy-function mangos-api